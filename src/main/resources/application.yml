spring:
  application:
    name: PersonalFinanceApplication

  profiles:
    default: ${SPRING_PROFILES_DEFAULT:dev}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  sql:
    init:
      mode: never

server:
  port: 8080
