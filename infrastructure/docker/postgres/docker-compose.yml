version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: personal-finance-postgres
    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - personal_finance_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OPTIONAL: pgAdmin (enable only if you want browser-based DB UI)
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: personal-finance-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    profiles:
      - tools

volumes:
  personal_finance_pg_data:
